<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Johann D. Gaebler - Under Construction</title>
    <style>
      /* Site-wide styling */
      html {
        margin-left: calc(100vw - 100%);
        margin-right: 0;
      }
      
      body {
        max-width: calc(80ch + 2rem);
        margin: 0 auto 0 auto;
        font-family: Palatino, Georgia, serif;
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr auto;
        background-color: ghostwhite;
      }
      
      body a {
        color: darkslategrey;
      }
      
      header {
        margin-bottom: 2rem;
      }
      
      header h1 {
        margin: 4rem 0 0 0;
        font-weight: normal;
        font-size: 3rem;
      }
      
      .contact-info {
        margin: 0;
      }
      
      main {
        text-align: center;
        padding: 2rem 0;
      }
      
      main p {
        line-height: 1.8rem;
        font-size: 1.2rem;
      }
      
      .construction-message {
        margin: 2rem 0;
        padding: 2rem;
        background-color: #f5f5f5;
        border-radius: 8px;
        border: 2px solid #ddd;
      }
      
      footer {
        flex-shrink: 0;
        width: 100%;
        text-align: center;
        font-size: 0.75rem;
        margin: 2rem 0 1rem 0;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Johann D. Gaebler</h1>
      <p class="contact-info">
        <a href="mailto:me@jgaeb.com">Email</a>
      </p>
    </header>
    
    <main>
      <div class="construction-message">
        <h2>🚧 Website Under Construction 🚧</h2>
        <p>This site is currently being updated and will be back soon.</p>
      </div>
    </main>
    
    <footer>
      <p>&copy; 2025 Johann D. Gaebler</p>
    </footer>
  </body>
</html>
